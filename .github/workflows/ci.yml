name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_ai
      NEXTAUTH_SECRET: ci-nextauth-secret
      APP_JWT_SECRET: ci-app-jwt-secret
      NEXTAUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      OPENAI_API_KEY: sk-ci
      OPENAI_MODEL: gpt-4o-mini
      GITHUB_ID: github-id
      GITHUB_SECRET: github-secret
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Generate Prisma Client
        run: npm run prisma:generate
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
